version: "3.8"
services:
  localai:
    image: ghcr.io/go-skynet/localai:latest
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]
    volumes:
      - ./models:/models
      - ./localai-config.json:/etc/localai/config.json:ro
    environment:
      - LOCALAI_CONFIG=/etc/localai/config.json
    ports:
      - "8080:8080"
    runtime: nvidia

  assistant-api:
    image: ghcr.io/example/assistant-api:stable
    restart: unless-stopped
    env_file:
      - ./assistant-api.env
    volumes:
      - ./config:/config:ro
      - ./data:/data
    ports:
      - "3000:3000"
    depends_on:
      - localai

  faiss-worker:
    image: ghcr.io/example/faiss-worker:stable
    restart: unless-stopped
    env_file:
      - ./assistant-api.env
    volumes:
      - ./data:/data
      - ./models:/models

  ui:
    image: ghcr.io/example/assistant-ui:stable
    restart: unless-stopped
    environment:
      - API_URL=http://SERVER_IP:3000
    ports:
      - "3001:80"